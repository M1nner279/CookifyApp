version: '3.9'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    environment:
      SA_PASSWORD: "YourStrong!Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./mssql_init:/var/opt/mssql/backup 
    entrypoint: /bin/sh /var/opt/mssql/backup/entrypoint.sh
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourStrong!Pass123 -C -Q 'SELECT 1'" ]
      interval: 5s
      timeout: 5s
      retries: 15
    

  cookifyapi:
    build:
      context: ../backend/CookifyAPI/CookifyAPI
      dockerfile: Dockerfile
    container_name: cookify_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:80"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=CookifyDb;User Id=sa;Password=YourStrong!Pass123;TrustServerCertificate=True"
    ports:
      - "5022:80"
#      - "5022:443"

volumes:
  mssql_data: